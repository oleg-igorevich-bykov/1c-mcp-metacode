# Пример Gitea Actions workflow для репозитория конфигурации 1С
# (vanessa-bootstrap раскладка: src/cf, src/cfe/<Name>; PROJECT_LAYOUT=vanessa).
#
# Кладите в `.gitea/workflows/reindex-on-push.yml` **репозитория самой
# 1С-конфигурации** — здесь он лежит только как справочный пример.
# Провижининг/декоммишен контейнеров — отдельный workflow ops-репозитория,
# см. examples/fleet/.
#
# Что делает: при пуше в main или dev обновляет соответствующий чекаут на хосте
# и рестартует соответствующий контейнер-индексатор. Рестарт — это НЕ full
# reload: MCP-эндпоинт поднимается сразу, а встроенный startup-инкремент фоном
# подхватывает только дельту (вместо ожидания планового цикла раз в
# INCREMENTAL_LOADING_INTERVAL_MINUTES).
#
# Конвенции (совпадают с examples/fleet/generate_fleet.py):
#   чекаут:        $FLEET_DATA_ROOT/<org>/<repo>/<branch>   (полный клон, checkout ветки)
#   контейнер:     <org>-<repo>-<branch>-graph
#   rlm-контейнер: <org>-<repo>-rlm (один на репозиторий, если в fleet.yml стоит rlm=true)
#
# Если у репозитория есть rlm-tools-bsl сайдкар (fleet.yml: rlm=true), дополнительно
# делает `docker exec ... rlm-bsl-index index update` — инкрементально (mtime+size,
# git-ускорено), без рестарта rlm-контейнера. Если сайдкара нет — шаг сам себя
# пропускает (docker exec на несуществующий контейнер просто падает, это ловится).
#
# Требования: self-hosted runner на хосте флота (docker CLI + FLEET_DATA_ROOT);
# встроенного GITEA_TOKEN достаточно (доступ к своему же репозиторию).

name: Reindex 1C config (1c-mcp-metacode)

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: reindex-${{ gitea.repository }}-${{ gitea.ref_name }}
  cancel-in-progress: false

jobs:
  reindex:
    runs-on: [self-hosted, metacode-host]      # <-- label своего runner-а
    env:
      FLEET_DATA_ROOT: /opt/mcp-fleet/data     # <-- как в fleet.yml settings.data_root
      BRANCH: ${{ gitea.ref_name }}
      REPO: ${{ gitea.repository }}            # owner/repo
      REPO_URL: ${{ gitea.server_url }}/${{ gitea.repository }}.git
      REPO_TOKEN: ${{ secrets.GITEA_TOKEN }}
      GUID_DUMP_BRANCH: guid-dump
    steps:
      - name: Sync branch checkout
        run: |
          set -euo pipefail
          DEST="$FLEET_DATA_ROOT/$REPO/$BRANCH"
          AUTH_URL="$(echo "$REPO_URL" | sed -E "s#(https://)#\1x-access-token:${REPO_TOKEN}@#")"

          if [ ! -d "$DEST/.git" ]; then
            echo "Checkout $DEST не существует — проект не запровижинен через ops-репо (fleet.yml)."
            echo "Добавьте запись в fleet.yml и дождитесь apply-fleet, потом повторите пуш."
            exit 1
          fi

          git -C "$DEST" remote set-url origin "$AUTH_URL"
          git -C "$DEST" fetch origin "$BRANCH"
          git -C "$DEST" checkout "$BRANCH"
          git -C "$DEST" reset --hard "origin/$BRANCH"
          # ConfigDumpInfo.xml untracked — исключаем из clean, чтобы не смахнуть
          # оверлей до того, как следующий шаг положит его заново.
          git -C "$DEST" clean -fdx \
            -e src/cf/ConfigDumpInfo.xml \
            -e 'src/cfe/*/ConfigDumpInfo.xml'

      - name: Overlay ConfigDumpInfo.xml from guid-dump branch (main only)
        if: gitea.ref_name == 'main'
        run: |
          set -euo pipefail
          DEST="$FLEET_DATA_ROOT/$REPO/$BRANCH"
          AUTH_URL="$(echo "$REPO_URL" | sed -E "s#(https://)#\1x-access-token:${REPO_TOKEN}@#")"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          if git clone --branch "$GUID_DUMP_BRANCH" --single-branch --depth 1 "$AUTH_URL" "$TMP_DIR" 2>/dev/null; then
            if [ -f "$TMP_DIR/cf/ConfigDumpInfo.xml" ]; then
              mkdir -p "$DEST/src/cf"
              cp "$TMP_DIR/cf/ConfigDumpInfo.xml" "$DEST/src/cf/ConfigDumpInfo.xml"
              echo "GUID: base config overlaid"
            fi
            if [ -d "$TMP_DIR/cfe" ]; then
              for ext_dir in "$TMP_DIR"/cfe/*/; do
                [ -d "$ext_dir" ] || continue
                ext_name="$(basename "$ext_dir")"
                if [ -f "$ext_dir/ConfigDumpInfo.xml" ] && [ -d "$DEST/src/cfe/$ext_name" ]; then
                  cp "$ext_dir/ConfigDumpInfo.xml" "$DEST/src/cfe/$ext_name/ConfigDumpInfo.xml"
                  echo "GUID: extension $ext_name overlaid"
                fi
              done
            fi
          else
            echo "guid-dump branch not found — skipping GUID overlay"
          fi

      - name: Restart indexer container (triggers startup incremental, NOT full reload)
        run: |
          set -euo pipefail
          ORG="${REPO%%/*}"; NAME="${REPO##*/}"
          CONTAINER="$(echo "${ORG}-${NAME}-${BRANCH}-graph" | tr '[:upper:]_' '[:lower:]-')"
          docker restart "$CONTAINER"

      - name: Update rlm-tools-bsl index (if the repo has an rlm sidecar)
        run: |
          set -euo pipefail
          ORG="${REPO%%/*}"; NAME="${REPO##*/}"
          RLM_CONTAINER="$(echo "${ORG}-${NAME}-rlm" | tr '[:upper:]_' '[:lower:]-')"

          if ! docker inspect -f '{{.State.Running}}' "$RLM_CONTAINER" >/dev/null 2>&1; then
            echo "no rlm sidecar for $REPO (or not running) — skipping index update"
            exit 0
          fi
          docker exec "$RLM_CONTAINER" rlm-bsl-index index update "/repos/$BRANCH"

      - name: Show recent logs
        run: |
          ORG="${REPO%%/*}"; NAME="${REPO##*/}"
          CONTAINER="$(echo "${ORG}-${NAME}-${BRANCH}-graph" | tr '[:upper:]_' '[:lower:]-')"
          timeout 30 docker logs --tail=60 "$CONTAINER" || true
