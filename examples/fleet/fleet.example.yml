# fleet.yml — единственный источник правды о флоте MCP-индексаторов.
# Лежит в служебном ops-репозитории (например infra/mcp-fleet); из него
# generate_fleet.py генерирует docker-compose.fleet.yml и routes-секцию
# gateway-конфига. Руки в сгенерированные файлы не лезут — только сюда.
#
# Конвенции (фиксированы генератором):
#   контейнер / upstream:  <org>-<repo>-<branch>-graph, внутренний порт 6001
#   PROJECT_NAME:          <org>-<repo>-<branch>
#   gateway prefix:        /mcp/<org>-<repo>-<branch>
#   чекаут на хосте:       ${FLEET_DATA_ROOT}/<org>/<repo>/<branch>  (= /app/data)
#   storage volume:        fleet_storage_<org>_<repo>_<branch>
#
# Все контейнеры и gateway сидят в одной внешней docker-сети (settings.network),
# host-порты индексаторам не выдаются — наружу торчит только gateway.

settings:
  # Внешняя docker-сеть, общая с gateway и Neo4j (создаётся отдельно:
  # docker network create mcp-net)
  network: mcp-net
  # Имя сервиса/контейнера Neo4j в этой сети
  neo4j_container: 1c-neo4j
  # Docker-образ индексатора 1c-mcp-metacode (граф + поиск по коду).
  # Собирается и тегируется вручную (docker build), сюда — только готовый тег,
  # генератор образы не собирает.
  image: roctup/1c-mcp-metacode:latest
  # Docker-образ rlm-tools-bsl (индекс методов/вызовов, git grep). Тоже
  # собирается вручную заранее. Нужен, только если хотя бы у одного проекта
  # ниже стоит rlm: true.
  rlm_image: rlm-tools-bsl:latest
  # Корень рабочих чекаутов на хосте
  data_root: /opt/mcp-fleet/data
  # Файл с "ручными" (не-fleet) маршрутами gateway — tier 1 и прочее.
  # Генератор вставляет fleet-маршруты ПОСЛЕ содержимого этого файла.
  gateway_base_routes: gw-routes.base.yml

projects:
  - repo: kgg/do30            # owner/repo в Gitea — он же попадает в required_repos
    rlm: true                 # + один rlm-tools-bsl сайдкар на весь репозиторий
                               # (внутри зарегистрированы все ветки ниже как отдельные
                               # rlm-проекты — main/dev), свой gateway-маршрут
    branches:
      - name: main
      - name: dev
        lightweight: true     # без эмбеддингов кода, сводок и GUID — быстрый дешёвый индекс
  - repo: kgg/other-project
    branches:
      - name: main
