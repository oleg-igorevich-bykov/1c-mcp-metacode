# Gitea Actions workflow служебного ops-репозитория (infra/mcp-fleet).
# Кладётся туда в .gitea/workflows/apply-fleet.yml. Рядом в корне ops-репо лежат:
#   fleet.yml            — источник правды (см. fleet.example.yml)
#   gw-routes.base.yml   — ручные tier-1 маршруты gateway
#   generate_fleet.py    — генератор
#
# Полный GitOps-цикл: и provision, и decommission — это ПРАВКА fleet.yml
# (добавили/убрали запись, закоммитили в main ops-репо) → этот workflow
# приводит хост в соответствие:
#   - клонирует недостающие чекауты (полный clone, checkout своей ветки);
#   - оверлеит ConfigDumpInfo.xml из guid-dump-ветки проектного репо (не-lightweight);
#   - генерирует docker-compose.fleet.yml + gw-routes.yml + projects.json для
#     rlm-tools-bsl сервисов (repo: rlm=true в fleet.yml);
#   - docker compose up -d --remove-orphans (новые сервисы поднялись, у убранных
#     контейнеры удалены);
#   - для новых веток с rlm=true: собирает первичный rlm-индекс (docker exec ...
#     rlm-bsl-index index build);
#   - рестартует gateway (маршруты обновились);
#   - для удалённых из fleet.yml: чистит Neo4j (--clear-project), чекаут и volume.
#
# Первичная индексация 1c-mcp-metacode стартует сама при первом старте контейнера
# (bootstrap в пустой project scope) — FULL_METADATA_RELOAD не нужен. Для
# rlm-tools-bsl автостарта индекса нет — сборку делает шаг ниже явно.
#
# Требования:
# - self-hosted runner на хосте флота (docker CLI + доступ к FLEET_DATA_ROOT);
# - секрет FLEET_GIT_TOKEN — token с правом чтения всех индексируемых репозиториев
#   (встроенный GITEA_TOKEN даёт доступ только к самому ops-репо, его не хватит);
# - `concurrency:` требует Gitea >= 1.26 (иначе уберите блок и оберните шаги в flock);
# - в GW_CONFIG_PATH указывается путь, который контейнер gateway читает как свой
#   routes-конфиг (примонтированный файл).

name: Apply MCP fleet

on:
  push:
    branches: [main]
    paths:
      - fleet.yml
      - gw-routes.base.yml
      - generate_fleet.py
  workflow_dispatch: {}

concurrency:
  group: apply-mcp-fleet
  cancel-in-progress: false

jobs:
  apply:
    runs-on: [self-hosted, metacode-host]            # <-- label своего runner-а
    env:
      FLEET_DIR: /opt/mcp-fleet                      # <-- рабочий каталог флота на хосте
      GW_CONFIG_PATH: /opt/mcp-gateway/gw-routes.yml # <-- конфиг, который читает gateway
      GW_CONTAINER: mcp-gateway                      # <-- имя контейнера gateway
      GITEA_URL: ${{ github.server_url }}
      GIT_TOKEN: ${{ secrets.FLEET_GIT_TOKEN }}
      IMAGE: roctup/1c-mcp-metacode:latest
      NETWORK: mcp-net
      GUID_DUMP_BRANCH: guid-dump
    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4

      - name: Generate configs and compute plan
        id: plan
        run: |
          set -euo pipefail
          pip3 install --quiet PyYAML || true
          python3 generate_fleet.py fleet.yml --out-dir "$FLEET_DIR" --plan > /tmp/fleet-plan.json
          cat /tmp/fleet-plan.json

      - name: Clone missing checkouts (provision)
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json, os, subprocess, pathlib

          plan = json.load(open("/tmp/fleet-plan.json"))
          gitea = os.environ["GITEA_URL"].rstrip("/")
          token = os.environ["GIT_TOKEN"]
          guid_branch = os.environ["GUID_DUMP_BRANCH"]

          def run(*cmd, **kw):
              print("+", " ".join(cmd), flush=True)
              subprocess.run(cmd, check=True, **kw)

          for unit in plan["create"]:
              repo, branch, dest = unit["repo"], unit["branch"], unit["dir"]
              url = gitea.replace("https://", f"https://x-access-token:{token}@") + f"/{repo}.git"
              pathlib.Path(dest).parent.mkdir(parents=True, exist_ok=True)
              # Полный клон (все ветки), checkout нужной — как договорились, без --single-branch
              run("git", "clone", url, dest)
              run("git", "-C", dest, "checkout", branch)

              # GUID-оверлей только для не-lightweight (обычно main)
              if not unit.get("lightweight"):
                  import tempfile, shutil
                  tmp = tempfile.mkdtemp()
                  try:
                      subprocess.run(
                          ["git", "clone", "--branch", guid_branch, "--single-branch",
                           "--depth", "1", url, tmp],
                          check=False, capture_output=True,
                      )
                      cf = pathlib.Path(tmp) / "cf" / "ConfigDumpInfo.xml"
                      if cf.exists():
                          dst = pathlib.Path(dest) / "src" / "cf" / "ConfigDumpInfo.xml"
                          dst.parent.mkdir(parents=True, exist_ok=True)
                          shutil.copy(cf, dst)
                          print(f"GUID overlay: {repo} base config")
                      cfe = pathlib.Path(tmp) / "cfe"
                      if cfe.is_dir():
                          for ext in cfe.iterdir():
                              src = ext / "ConfigDumpInfo.xml"
                              tgt_dir = pathlib.Path(dest) / "src" / "cfe" / ext.name
                              if src.exists() and tgt_dir.is_dir():
                                  shutil.copy(src, tgt_dir / "ConfigDumpInfo.xml")
                                  print(f"GUID overlay: {repo} ext {ext.name}")
                  finally:
                      shutil.rmtree(tmp, ignore_errors=True)
          EOF

      - name: Apply compose (up new, remove orphans)
        run: |
          set -euo pipefail
          cd "$FLEET_DIR"
          # .env с NEO4J_PASSWORD и общими настройками уже лежит в FLEET_DIR
          docker compose -f docker-compose.fleet.yml up -d --remove-orphans

      - name: Build rlm-tools-bsl index for newly created checkouts
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json, os, subprocess, time

          plan = json.load(open("/tmp/fleet-plan.json"))
          units = [u for u in plan["create"] if u.get("rlm")]
          if not units:
              raise SystemExit(0)

          def container_running(name: str) -> bool:
              out = subprocess.run(
                  ["docker", "inspect", "-f", "{{.State.Running}}", name],
                  capture_output=True, text=True,
              )
              return out.returncode == 0 and out.stdout.strip() == "true"

          for unit in units:
              container = unit["rlm_container"]
              # up -d стартует контейнер синхронно, но дадим небольшой запас
              # на инициализацию процесса перед первым exec.
              for _ in range(30):
                  if container_running(container):
                      break
                  time.sleep(1)
              else:
                  print(f"WARN: {container} не поднялся вовремя, пропускаю index build")
                  continue

              path = f"/repos/{unit['branch']}"
              print(f"index build: {container} {path}", flush=True)
              subprocess.run(
                  ["docker", "exec", container, "rlm-bsl-index", "index", "build", path],
                  check=True,
              )
          EOF

      - name: Update gateway routes and restart gateway
        run: |
          set -euo pipefail
          cp "$FLEET_DIR/gw-routes.yml" "$GW_CONFIG_PATH"
          docker restart "$GW_CONTAINER"

      - name: Cleanup removed projects (decommission)
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import json, os, subprocess, shutil

          plan = json.load(open("/tmp/fleet-plan.json"))
          image = os.environ["IMAGE"]
          network = os.environ["NETWORK"]
          fleet_dir = os.environ["FLEET_DIR"]

          for unit in plan["delete"]:
              print(f"decommission: {unit['project_name']}", flush=True)
              # 1. Данные проекта из Neo4j (батчёванный clear_project внутри приложения)
              subprocess.run(
                  ["docker", "run", "--rm", "--network", network,
                   "--env-file", f"{fleet_dir}/.env", image,
                   "python", "main.py", "--clear-project", unit["project_name"]],
                  check=True,
              )
              # 2. Рабочий чекаут
              shutil.rmtree(unit["dir"], ignore_errors=True)
              # 3. Storage volume (контейнер уже удалён --remove-orphans шагом выше)
              subprocess.run(
                  ["docker", "volume", "rm", f"mcp-fleet_{unit['volume']}"],
                  check=False,
              )
          EOF
          # Примечание: projects.json rlm-сервисов перегенерируется целиком на
          # каждом apply (см. Generate configs) — убранная ветка сама пропадёт
          # из реестра. Сам rlm-контейнер репозитория удаляется --remove-orphans
          # выше, когда для репо не осталось ни одной ветки с rlm=true. Каталог
          # data_root/_rlm/<org>/<repo>/ (config+cache) при этом на диске не
          # удаляется — не критично (просто неиспользуемые файлы), но при
          # желании чистить руками/отдельным шагом.

      - name: Show fleet status
        run: |
          cd "$FLEET_DIR"
          docker compose -f docker-compose.fleet.yml ps
